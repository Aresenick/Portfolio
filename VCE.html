<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="images/nub-nub-cat.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VCE — Linge Shi</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    .vce-hero {
      display: flex;
      gap: 1.5rem;
      margin: 0 0 2.5rem;
      flex-wrap: wrap;
    }
    .vce-hero .stat-card {
      flex: 1;
      min-width: 140px;
      background: var(--primary-blue);
      color: var(--white);
      border-left: none;
      border-radius: 10px;
      padding: 1.6rem 1.4rem 1.4rem;
      position: relative;
      overflow: hidden;
      backdrop-filter: none;
    }
    .vce-hero .stat-card::after {
      content: '';
      position: absolute;
      bottom: -18px;
      right: -18px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    .vce-hero .stat-value { font-size: 2.1rem; color: rgba(255,255,255,0.95); margin-bottom: 0.3rem; }
    .vce-hero .stat-label { color: rgba(255,255,255,0.65); font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; }

    .vce-section-title {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-family: 'IBM Plex Mono', monospace;
      margin: 2.5rem 0 1.5rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border-grey);
    }

    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .subjects-grid .subject-card {
      background: var(--glass-bg);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.6rem;
      margin-bottom: 0;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .subjects-grid .subject-card:hover {
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .subjects-grid .subject-card.complete { border-left: 3px solid var(--primary-blue); }
    .subjects-grid .subject-card.pending  { border-left: 3px solid var(--border-grey); }

    .card-header { display: flex; align-items: flex-start; gap: 1rem; }

    .ring-wrap { flex-shrink: 0; width: 100px; height: 100px; position: relative; }
    .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: var(--border-grey); stroke-width: 8; }
    .ring-fill {
      fill: none; stroke-width: 8; stroke-linecap: round;
      stroke: var(--primary-blue);
      transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
    }
    .ring-fill.green { stroke: #4a9b6f; }
    .ring-fill.muted { stroke: #ccc; }
    .ring-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; line-height: 1.15;
    }
    .ring-pct { font-size: 1.25rem; font-weight: 600; color: var(--primary-blue); letter-spacing: -0.02em; }
    .ring-pct.green { color: #4a9b6f; }
    .ring-pct.muted { color: #bbb; font-size: 0.85rem; }
    .ring-note { font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }

    .card-meta { flex: 1; min-width: 0; }
    .card-meta h3 { margin: 0 0 0.2rem; font-size: 1.1rem; font-weight: 600; }
    .card-tag {
      display: inline-block; font-size: 0.65rem; letter-spacing: 0.1em;
      text-transform: uppercase; font-family: 'IBM Plex Mono', monospace;
      background: var(--light-blue); color: var(--primary-blue);
      padding: 2px 8px; border-radius: 20px; margin-bottom: 0.4rem;
    }
    .card-desc { font-size: 0.87rem; color: var(--text-secondary); line-height: 1.55; font-style: italic; margin-top: 0.4rem; }

    .assessments { display: flex; flex-direction: column; gap: 0.6rem; }
    .assess-row { display: flex; flex-direction: column; gap: 3px; }
    .assess-name { font-size: 0.82rem; color: var(--text-primary); }
    .assess-bar-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .bar-track { flex: 1; height: 5px; background: var(--border-grey); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; background: var(--primary-blue); transition: width 1.1s cubic-bezier(.4,0,.2,1); }
    .bar-fill.green { background: #4a9b6f; }
    .bar-fill.muted { background: #ccc; }
    .bar-pct { font-size: 0.78rem; font-family: 'IBM Plex Mono', monospace; color: var(--text-secondary); min-width: 36px; text-align: right; }
    .bar-pending { font-size: 0.78rem; color: #bbb; font-style: italic; }

    .inline-bar { display: flex; align-items: center; gap: 0.6rem; }
    .inline-bar .bar-track { width: 80px; flex: none; }

    .badge { display: inline-block; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; padding: 2px 8px; border-radius: 20px; }
    .badge-pending { background: var(--light-grey); color: #aaa; }
    .badge-done { background: #eaf4ee; color: #4a9b6f; }

    .results-table-wrap {
      background: var(--glass-bg);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      overflow: hidden;
      margin-bottom: 3rem;
    }

    @media (max-width: 768px) {
      .subjects-grid { grid-template-columns: 1fr; }
      .vce-hero { gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>

  <nav>
    <div class="nav-content">
      <a href="index.html" class="logo">Linge Shi</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="CV.html">CV</a></li>
        <li><a href="VCE.html" class="active">VCE</a></li>
        <li><a href="Projects.html">Projects</a></li>
        <li><a href="Blog.html">Blog</a></li>
      </ul>
    </div>
  </nav>

  <div class="hero">
    <h1>VCE Studies</h1>
    <div class="page-divider"></div>
  </div>

  <main>

    <div class="vce-hero">
      <div class="stat-card"><div class="stat-value">99.5+</div><div class="stat-label">ATAR Target</div></div>
      <div class="stat-card"><div class="stat-value">5</div><div class="stat-label">VCE Subjects</div></div>
      <div class="stat-card"><div class="stat-value">2025–27</div><div class="stat-label">Study Period</div></div>
      <div class="stat-card"><div class="stat-value">~90%</div><div class="stat-label">Current Avg.</div></div>
    </div>

    <div class="subjects-grid" id="subjects-grid"></div>

    <div class="vce-section-title">Year 11 End-of-Term Results — 2025</div>
    <div class="results-table-wrap">
      <table class="results-table">
        <thead>
          <tr><th>Subject</th><th>Units</th><th>Result</th><th>Status</th></tr>
        </thead>
        <tbody id="y11-body"></tbody>
      </table>
    </div>

  </main>

  <footer>
    <p>&copy; 2026 Linge Shi. All rights reserved.</p>
  </footer>

  <script>
  const SUBJECTS = [
    {
      name: "Mathematical Methods",
      units: "Units 3 & 4",
      tag: "Year 12",
      color: "blue",
      overallPct: 84,
      desc: "My favourite subject — pure joy. Applied calculus, functions, graphs, and probability. It gives me space to exercise my feel for numbers.",
      assessments: [
        { name: "Mid-year Exam 1 (Units 1–2)", pct: 92 },
        { name: "Mid-year Exam 2 (Units 1–2)", pct: 80 },
        { name: "End-of-year Exam 1",           pct: 84 },
        { name: "End-of-year Exam 2",           pct: 84 },
      ]
    },
    {
      name: "Computational Physics",
      units: "Units 1 & 2",
      tag: "Physics + Specialist Maths equiv.",
      color: "blue",
      overallPct: 89,
      desc: "Equivalent to Physics 3&4 and Specialist Maths 3&4 combined. Covers dynamics, kinematics, vectors and complex modulus — directly tied to my research.",
      assessments: [
        { name: "Dynamics (Physics)",          pct: 90 },
        { name: "Kinematics in 1D (Physics)",  pct: 87 },
        { name: "Modulus — 14/18",             pct: Math.round(14/18*100) },
        { name: "Vectors — 16/20",             pct: Math.round(16/20*100) },
      ]
    },
    {
      name: "Chemistry",
      units: "Units 3 & 4",
      tag: "Year 12",
      color: "green",
      overallPct: 100,
      desc: "Started in Year 10. Organic chem and redox come naturally; stoichiometry is satisfyingly complex. Built CHEMI partly as a study tool for this subject.",
      assessments: [
        { name: "Term 1 Exam — Periodic Trends & Element Calculations", pct: 100 },
        { name: "Term 2 Exam", pct: null },
      ]
    },
    {
      name: "English",
      units: "Units 3 & 4",
      tag: "Year 12",
      color: "muted",
      overallPct: null,
      desc: "Particularly enjoy analysing historical texts. Macbeth was a highlight and I look forward to deeper comparative analysis of Shakespeare.",
      assessments: [
        { name: "SAC 1", pct: null },
        { name: "SAC 2", pct: null },
      ]
    },
    {
      name: "Computing",
      units: "Units 1 & 2",
      tag: "Year 11 only",
      color: "muted",
      overallPct: 65,
      desc: "A comfortable subject given my coding background. No formal percentage grading — all tasks passed. Structured practice for software design principles.",
      assessments: [
        { name: "All tasks — pass (est. 60–70%)", pct: 65 },
      ]
    },
  ];

  const Y11_RESULTS = [
    { subject: "Mathematical Methods", units: "1 & 2", pct: 84,  done: true  },
    { subject: "Computational Physics",units: "1 & 2", pct: 89,  done: true  },
    { subject: "Chemistry",            units: "1 & 2", pct: 100, done: true  },
    { subject: "English",              units: "1 & 2", pct: null, done: false },
    { subject: "Computing",            units: "1 & 2", pct: 65,  done: true  },
  ];

  const CIRC = 2 * Math.PI * 45;

  function buildRing(pct, color) {
    const cls = (color === 'blue') ? '' : color;
    if (pct === null) {
      return `<div class="ring-wrap">
        <svg viewBox="0 0 100 100"><circle class="ring-track" cx="50" cy="50" r="45"/>
        <circle class="ring-fill muted" cx="50" cy="50" r="45"
          stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC*0.72}"/></svg>
        <div class="ring-text"><span class="ring-pct muted">TBD</span><span class="ring-note">pending</span></div>
      </div>`;
    }
    const offset = CIRC * (1 - pct / 100);
    return `<div class="ring-wrap">
      <svg viewBox="0 0 100 100"><circle class="ring-track" cx="50" cy="50" r="45"/>
      <circle class="ring-fill ${cls}" cx="50" cy="50" r="45"
        stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC}" data-offset="${offset}"/></svg>
      <div class="ring-text"><span class="ring-pct ${cls}">${pct}%</span><span class="ring-note">overall</span></div>
    </div>`;
  }

  function buildBar(a, color) {
    const cls = (color === 'blue') ? '' : color;
    if (a.pct === null) {
      return `<div class="assess-row">
        <span class="assess-name">${a.name}</span>
        <div class="assess-bar-wrap">
          <div class="bar-track"><div class="bar-fill muted" style="width:0%"></div></div>
          <span class="bar-pending">pending</span>
        </div></div>`;
    }
    return `<div class="assess-row">
      <span class="assess-name">${a.name}</span>
      <div class="assess-bar-wrap">
        <div class="bar-track"><div class="bar-fill ${cls}" style="width:0%" data-pct="${a.pct}"></div></div>
        <span class="bar-pct">${a.pct}%</span>
      </div></div>`;
  }

  function renderSubjects() {
    document.getElementById('subjects-grid').innerHTML = SUBJECTS.map(s => `
      <div class="subject-card ${s.overallPct !== null ? 'complete' : 'pending'}">
        <div class="card-header">
          ${buildRing(s.overallPct, s.color)}
          <div class="card-meta">
            <span class="card-tag">${s.tag}</span>
            <h3>${s.name}</h3>
            <p style="font-size:0.75rem;color:var(--text-secondary);font-family:'IBM Plex Mono',monospace;margin:0.1rem 0 0">${s.units}</p>
            <p class="card-desc">${s.desc}</p>
          </div>
        </div>
        <div class="assessments">${s.assessments.map(a => buildBar(a, s.color)).join('')}</div>
      </div>`).join('');
  }

  function renderY11() {
    document.getElementById('y11-body').innerHTML = Y11_RESULTS.map(r => `
      <tr>
        <td>${r.subject}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:0.8rem;color:var(--text-secondary)">${r.units}</td>
        <td>${r.pct !== null
          ? `<div class="inline-bar"><div class="bar-track"><div class="bar-fill" style="width:0%" data-pct="${r.pct}"></div></div><span class="bar-pct">${r.pct}%</span></div>`
          : `<span class="bar-pending">pending</span>`}
        </td>
        <td>${r.done
          ? `<span class="badge badge-done">Complete</span>`
          : `<span class="badge badge-pending">Pending</span>`}
        </td>
      </tr>`).join('');
  }

  function animateOnView() {
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.querySelectorAll('.bar-fill[data-pct]').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
        entry.target.querySelectorAll('.ring-fill[data-offset]').forEach(el => {
          el.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)';
          el.style.strokeDashoffset = el.dataset.offset;
        });
        io.unobserve(entry.target);
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.subject-card, .results-table-wrap').forEach(el => io.observe(el));
  }

  renderSubjects();
  renderY11();
  animateOnView();
  </script>
</body>
</html>
